<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h2> <span style="color: brown;">Rock </span> <span style="color: rgb(219, 211, 211);"> Paper </span> <span style="color: skyblue;">Scissors</span></h2>
    <div class="scoreboards">
      <div id="playerScore">
        Player Score: 
        <p id="playscores"> 0 </p>
      </div>
      <div id="computerscore">
        Computer Score:<br>
        <p id="compscores"> 0 </p>
      </div>
    </div>
    <div id="movesleft"> Total Moves : 10 </div>
    <div id="option">
      <button id="rock"><i class="fas fa-hand-rock"></i></button>
      <button id="paper"><i class="fas fa-hand-paper"></i></button>
      <button id="scissors"><i class="fas fa-hand-scissors"></i></button>
    </div>
    <div id="result"> </div>
    <div id="popup">
      <div id="gameover">  </div>  
      <div id="finalresult"> </div>
    <button id="reload"></button>
    </div>
    <script src="main.js"></script>
  </body>
</html>
